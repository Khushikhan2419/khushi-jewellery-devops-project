apiVersion: apps/v1
kind: Deployment
metadata:
  name: diamond-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: diamond
  template:
    metadata:
      labels:
        app: diamond
    spec:
      containers:
        - name: diamond
          image: 176646220910.dkr.ecr.us-east-1.amazonaws.com/shopping-site-diamond:9c74bdfa20e937dc88a600f75c21e427f979eb3f
          ports:
            - containerPort: 80
