apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main
  template:
    metadata:
      labels:
        app: main
    spec:
      containers:
        - name: main
          image: 176646220910.dkr.ecr.us-east-1.amazonaws.com/shopping-site-main:9c74bdfa20e937dc88a600f75c21e427f979eb3f
          ports:
            - containerPort: 80
