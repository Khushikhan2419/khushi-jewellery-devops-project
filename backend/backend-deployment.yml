apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 176646220910.dkr.ecr.us-east-1.amazonaws.com/shopping-site-backend:9c74bdfa20e937dc88a600f75c21e427f979eb3f
          ports:
            - containerPort: 5000
